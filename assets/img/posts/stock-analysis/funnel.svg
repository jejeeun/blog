<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="'Pretendard','Apple SD Gothic Neo',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#26a163"/><stop offset="1" stop-color="#1f9156"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#43b87d"/><stop offset="1" stop-color="#34ac6f"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#74c99c"/><stop offset="1" stop-color="#62c08e"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a7ddc1"/><stop offset="1" stop-color="#98d6b4"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1b6b42" flood-opacity="0.20"/>
    </filter>
  </defs>

  <text x="60" y="58" font-size="34" font-weight="800" fill="#173d2a">종목 분석 = 넓게 거르고 <tspan fill="#1f9156">→</tspan> 좁게 파고드는 깔때기</text>
  <text x="60" y="92" font-size="19" fill="#7b8a82">위에서 아래로 갈수록 대상은 줄고, 대신 더 깊게 본다.</text>

  <g filter="url(#sh)">
    <!-- band 0 -->
    <polygon points="40,135 760,135 700,240 100,240" fill="url(#g1)"/>
    <!-- band 1 -->
    <polygon points="103,247 697,247 645,352 155,352" fill="url(#g2)"/>
    <!-- band 2 -->
    <polygon points="158,359 642,359 590,464 210,464" fill="url(#g3)"/>
    <!-- band 3 -->
    <polygon points="213,471 587,471 545,576 255,576" fill="url(#g4)"/>
    <!-- band 4 -->
    <polygon points="258,583 542,583 512,688 288,688" fill="#bfe5d0"/>
  </g>

  <!-- labels -->
  <g text-anchor="middle">
    <text x="400" y="178" font-size="27" font-weight="800" fill="#fff">전체 상장사</text>
    <text x="400" y="214" font-size="20" fill="#eafff3">약 2,000개</text>

    <text x="400" y="290" font-size="25" font-weight="800" fill="#fff">스크리닝 통과</text>
    <text x="400" y="324" font-size="19" fill="#eafff3">약 100개</text>

    <text x="400" y="402" font-size="24" font-weight="800" fill="#fff">깊이 분석</text>
    <text x="400" y="434" font-size="18" fill="#effaf3">1~5개</text>

    <text x="400" y="513" font-size="23" font-weight="800" fill="#1c5a3a">매수 결정</text>
    <text x="400" y="544" font-size="17" fill="#2c6b48">1개</text>

    <text x="400" y="625" font-size="22" font-weight="800" fill="#1c5a3a">분기 추적</text>
    <text x="400" y="655" font-size="16" fill="#2c6b48">계속</text>
  </g>

  <!-- right annotations -->
  <g font-size="19" fill="#5d6b63">
    <line x1="772" y1="187" x2="800" y2="187" stroke="#cdd8d1" stroke-width="2"/>
    <text x="810" y="193">정량 기준으로 1차 거름</text>
    <line x1="709" y1="299" x2="800" y2="299" stroke="#cdd8d1" stroke-width="2"/>
    <text x="810" y="305">PER·PBR·ROE로 추림</text>
    <line x1="654" y1="411" x2="800" y2="411" stroke="#cdd8d1" stroke-width="2"/>
    <text x="810" y="417">사업·재무·가치 끝까지</text>
    <line x1="599" y1="523" x2="800" y2="523" stroke="#cdd8d1" stroke-width="2"/>
    <text x="810" y="529">매수가·목표가 정해 산다</text>
    <line x1="544" y1="635" x2="800" y2="635" stroke="#cdd8d1" stroke-width="2"/>
    <text x="810" y="641">내 판단이 맞았는지 검증</text>
  </g>
</svg>
